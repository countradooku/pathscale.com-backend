name: Docker Build and Push

on:
  push:
    tags:
      - "path-be-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubicloud-standard-16
            suffix: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/pathscale-be" >> $GITHUB_ENV

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/path-be-v}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}-${{ matrix.suffix }}
            ${{ env.IMAGE }}:latest-${{ matrix.suffix }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.suffix }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.suffix }},mode=max

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-no_tls
          push: true
          build-args: FEATURES=
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}-no_tls
            ${{ env.IMAGE }}:latest-no_tls
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-no_tls
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-no_tls,mode=max
